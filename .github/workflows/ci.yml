name: liber-primus CI

# Regression gate for the cryptanalysis rig. Runs on a fresh checkout (no
# gitignored corpora present), which is exactly why english_baseline() must
# fall back to the committed quadgram model — see analysis/run_stats.py.

on:
  push:
    paths:
      - "liber-primus/**"
      - ".github/workflows/ci.yml"
  pull_request:
    paths:
      - "liber-primus/**"
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: liber-primus
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps (numpy for attack.py, pytest gate)
        run: pip install numpy pytest

      - name: Test suite (validate + attack/lp-try selftests + OTP-flat guard)
        run: pytest tests/test_rig.py -q

      - name: Fetch third-party transcription sources (gitignored)
        run: python data/fetch_sources.py

      - name: Smoke-test analysis scripts (no exceptions on a fresh clone)
        run: |
          python analysis/run_stats.py
          python analysis/crypto_rigor.py
          python analysis/structure_analysis.py
          python analysis/transcription/crossdiff.py
